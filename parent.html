<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>בקרת הורים - האזנה</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .live-pulse { width: 15px; height: 15px; background: #ccc; border-radius: 50%; display: inline-block; margin-left: 10px; }
        .active { background: red; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>האזנה בזמן אמת <div id="pulse" class="live-pulse"></div></h2>
        <p id="msg">לחץ על הכפתור כדי להתחיל לשמוע</p>
        <button id="enableAudio">הפעל שמע במכשיר זה</button>
    </div>

    <script>
const socket = io('https://my-child-monitor.onrender.com'); 
const msg = document.getElementById('msg');
const pulse = document.getElementById('pulse');
const audioBtn = document.getElementById('enableAudio');

let audioContext;
let nextStartTime = 0;

audioBtn.onclick = () => {
    // אתחול מערכת הסאונד בלחיצת כפתור (חובה בדפדפן)
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    audioBtn.style.display = 'none';
    msg.innerText = "מתחבר לשידור...";
    socket.emit('join-room');
};

socket.on('play-audio', async (audioData) => {
    if (!audioContext) return;

    try {
        // המרת הנתונים שהתקבלו למערך בינארי
        const arrayBuffer = await new Response(audioData).arrayBuffer();
        
        // פענוח הסאונד
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioContext.destination);

        // חישוב זמן הניגון כדי למנוע קפיצות ורווחים
        const currentTime = audioContext.currentTime;
        if (nextStartTime < currentTime) {
            nextStartTime = currentTime;
        }

        source.start(nextStartTime);
        nextStartTime += audioBuffer.duration;

        msg.innerText = "שומע סביבה בזמן אמת...";
        pulse.classList.add('active');

    } catch (e) {
        // במקרה של שגיאת פענוח קטנה, פשוט נמשיך לחתיכה הבאה
        console.log("Decoding delay...");
    }
});
    </script>
</body>
</html>
