<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מרכז בקרת הורים</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 20px; width: 250px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #eee; }
        .child-name { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: #333; }
        .status { font-size: 14px; color: #2ed573; margin-bottom: 20px; font-weight: bold; }
        .btn-listen { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .listening { background: #ff4757; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h1>מרכז בקרה - האזנה לילדים</h1>
    <div id="channels" class="grid">
        <p id="empty-msg">ממתין לחיבור מהמחשבונים של הילדים...</p>
    </div>

    <script>
const socket = io();
const channelsDiv = document.getElementById('channels');
const activeChildren = {};

socket.emit('join-room');

socket.on('play-audio', (data) => {
    const { audio, childName, childId } = data;
    
    if (!activeChildren[childId]) {
        createChildCard(childId, childName);
    }

    const child = activeChildren[childId];
    const uint8 = new Uint8Array(audio);

    // דחיפת הנתונים לתור של הילד הספציפי
    if (child.sourceBuffer && !child.sourceBuffer.updating && child.mediaSource.readyState === 'open') {
        try {
            child.sourceBuffer.appendBuffer(uint8);
        } catch (e) {
            console.error("שגיאה בהוספת באפר:", e);
        }
    } else {
        child.queue.push(uint8);
    }
});

function createChildCard(id, name) {
    const msg = document.getElementById('empty-msg');
    if (msg) msg.remove();

    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${id}`;
    card.innerHTML = `
        <div class="child-name">${name}</div>
        <div class="status" id="status-${id}">● ממתין לנתונים</div>
        <button class="btn-listen" id="btn-${id}">התחל האזנה</button>
    `;
    channelsDiv.appendChild(card);

    // הקמת מערכת השמע עבור הילד החדש
    const ms = new MediaSource();
    const audioTag = new Audio();
    audioTag.src = URL.createObjectURL(ms);
    
    activeChildren[id] = {
        mediaSource: ms,
        audioTag: audioTag,
        sourceBuffer: null,
        queue: [],
        isListening: false
    };

    ms.addEventListener('sourceopen', () => {
        // הגדרת פורמט אחיד - חייב להתאים למה שהילד שולח!
        const sb = ms.addSourceBuffer('audio/webm; codecs="opus"');
        activeChildren[id].sourceBuffer = sb;

        sb.addEventListener('updateend', () => {
            const child = activeChildren[id];
            if (child.queue.length > 0 && !sb.updating) {
                sb.appendBuffer(child.queue.shift());
            }
        });
    });

    card.querySelector('button').onclick = function() {
        const child = activeChildren[id];
        child.isListening = !child.isListening;
        
        if (child.isListening) {
            this.classList.add('listening');
            this.innerText = "מפסיק האזנה...";
            document.getElementById(`status-${id}`).innerText = "● מאזין חי";
            child.audioTag.play().catch(console.error);
        } else {
            this.classList.remove('listening');
            this.innerText = "התחל האזנה";
            document.getElementById(`status-${id}`).innerText = "● שידור מושהה";
            child.audioTag.pause();
        }
    };
}
    </script>
</body>
</html>
