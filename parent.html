<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>בקרת הורים - מרכז שליטה</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: system-ui; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 10px; display: inline-block; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn.active { background: #ff4757; }
    </style>
</head>
<body>
    <h1>מרכז בקרה - האזנה לילדים</h1>
    <div id="container"></div>

    <script>
        const socket = io();
        const container = document.getElementById('container');
        const activeChildren = {};
        let audioCtx;

        socket.emit('join-room');

        socket.on('play-audio', async (data) => {
            const { audio, childName, childId } = data;
            
            if (!activeChildren[childId]) {
                createCard(childId, childName);
            }

            if (activeChildren[childId].isListening && audioCtx) {
                try {
                    const buffer = await audioCtx.decodeAudioData(audio);
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);
                    source.start(0);
                } catch (e) { console.error("שגיאת פענוח"); }
            }
        });

        function createCard(id, name) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${name}</h3><p id="status-${id}">מחובר</p><button class="btn" id="btn-${id}">התחל האזנה</button>`;
            container.appendChild(card);
            activeChildren[id] = { isListening: false };

            card.querySelector('button').onclick = function() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                activeChildren[id].isListening = !activeChildren[id].isListening;
                this.classList.toggle('active');
                this.innerText = activeChildren[id].isListening ? "האזנה פעילה (עצור)" : "התחל האזנה";
                document.getElementById(`status-${id}`).innerText = activeChildren[id].isListening ? "מזרים סאונד..." : "מחובר";
            };
        }
    </script>
</body>
</html>
