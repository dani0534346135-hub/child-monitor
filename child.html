<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכשיר ילד - שידור</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px; background: #fff5f5;">
    <h1>יחידת קצה - ילד</h1>
    <button id="startBtn" style="padding: 15px 30px; font-size: 18px; background: #ff4757; color: white; border: none; border-radius: 10px;">הפעל שידור סביבה</button>
    <div id="status" style="margin-top: 20px; font-weight: bold; color: #d32f2f;">סטטוס: כבוי</div>

    <script>
        const socket = io('https://my-child-monitor.onrender.com');

        document.getElementById('startBtn').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // הגדרת פורמט אחיד (Opus) שחוסך רוחב פס ועובד טוב בסטרימינג
                const options = { mimeType: 'audio/webm; codecs=opus' };
                const mediaRecorder = new MediaRecorder(stream, options);
                
                socket.emit('join-room');

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        socket.emit('audio-data', event.data);
                    }
                };

                mediaRecorder.start(500); // שליחה כל חצי שנייה
                
                document.getElementById('status').innerText = "סטטוס: משדר סאונד...";
                document.getElementById('status').style.color = "green";
                document.getElementById('startBtn').disabled = true;
            } catch (err) {
                alert("שגיאה בגישה למיקרופון: " + err.message);
            }
        };
    </script>
</body>
</html>
