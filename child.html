<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכשיר ילד - שידור</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px; background: #fff5f5;">
    <h1>יחידת קצה - ילד</h1>
    <button id="startBtn" style="padding: 15px 30px; font-size: 18px; background: #ff4757; color: white; border: none; border-radius: 10px; cursor: pointer;">הפעל שידור סביבה</button>
    <div id="status" style="margin-top: 20px; font-weight: bold; color: #d32f2f;">סטטוס: כבוי</div>

    <script>
const urlParams = new URLSearchParams(window.location.search);
const myName = urlParams.get('name') || "ילד";

async function startBroadcast() {
    try {
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
        
        // שליחת השם לשרת בזמן ההתחברות
        socket.emit('join-room', { name: myName });

        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) socket.emit('audio-data', event.data);
        };
        mediaRecorder.start(1000);
    } catch (err) {
        document.querySelector('.btn-eq').addEventListener('click', startBroadcast, { once: true });
    }
}
    </script>
</body>
</html>
