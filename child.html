<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכשיר ילד - שידור</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #fff5f5; }
        .status { font-weight: bold; color: #d32f2f; margin-top: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #ff4757; color: white; }
    </style>
</head>
<body>
    <h1>יחידת קצה - ילד</h1>
    <button id="startBtn">הפעל שידור סביבה</button>
    <div id="status" class="status">סטטוס: כבוי</div>

    <script>
        // חשוב: החלף את הכתובת בכתובת ה-Render שלך לאחר ההעלאה
        const socket = io('https://my-child-monitor.onrender.com'); 

        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                
                socket.emit('join-room');

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        socket.emit('audio-stream', event.data);
                    }
                };

                mediaRecorder.start(500); // שליחת נתונים כל 500ms
                statusDiv.innerText = "סטטוס: משדר סאונד...";
                statusDiv.style.color = "green";
                startBtn.disabled = true;
                startBtn.innerText = "שידור פעיל";
            } catch (err) {
                statusDiv.innerText = "שגיאה: אין גישה למיקרופון";
                console.error(err);
            }
        };
    </script>
</body>
</html>
